<div class="employee-card">
    <div class="card-header">
        {% if doc.image %}
            <img src="{{ doc.image }}" class="emp-image">
        {% else %}
            <div class="emp-image-placeholder">No Photo</div>
        {% endif %}
    </div>
    <div class="card-body">
        <h2 class="emp-name">{{ doc.employee_name }}</h2>
        <p class="emp-id">{{ doc.name }}</p>
        <p class="emp-details">
            {{ doc.designation or '' }}<br>
            {{ doc.department or '' }}
        </p>
        
        <div class="qr-container">
            {% set qr_payload = get_signed_qr_payload(doc.name) %}
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=120x120&data={{ qr_payload }}" alt="QR Code" class="qr-image">
            <p class="qr-hint">Scan to mark attendance</p>
        </div>
    </div>
    <div class="card-footer">
        {{ doc.company }}
    </div>
</div>

<style>
    .employee-card {
        width: 3.5in;
        height: 2.2in; /* Credit card size approx */
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 10px;
        display: flex;
        flex-direction: row;
        background: #fff;
        font-family: Arial, sans-serif;
    }
    .card-header {
        width: 1.2in;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .emp-image {
        width: 100%;
        border-radius: 4px;
        object-fit: cover;
    }
    .emp-image-placeholder {
        width: 1in;
        height: 1in;
        background: #f0f0f0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #999;
        font-size: 10px;
        border-radius: 4px;
    }
    .card-body {
        flex: 1;
        padding-left: 15px;
        display: flex;
        flex-direction: column;
        justify-content: center;
    }
    .emp-name {
        margin: 0;
        font-size: 16px;
        color: #333;
    }
    .emp-id {
        margin: 2px 0 8px 0;
        font-size: 12px;
        color: #666;
        font-weight: bold;
    }
    .emp-details {
        margin: 0;
        font-size: 10px;
        color: #777;
    }
    .qr-container {
        margin-top: 10px;
        text-align: center;
    }
    .qr-image {
        width: 60px;
        height: 60px;
    }
    .qr-hint {
        font-size: 8px;
        margin: 2px 0 0 0;
        color: #999;
    }
    .card-footer {
        position: absolute;
        bottom: 5px;
        right: 10px;
        font-size: 10px;
        color: #bbb;
    }
    
    @media print {
        .employee-card {
            page-break-inside: avoid;
        }
    }
</style>
